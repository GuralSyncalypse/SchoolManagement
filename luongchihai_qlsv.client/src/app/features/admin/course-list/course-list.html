<div class="container">

  <h2>Danh sách môn học</h2>

  <table class="table table-bordered">

    <thead>
      <tr>
        <th>Mã Học Phần</th>
        <th>Tên học phần</th>
        <th>Số tín chỉ</th>
        <th>Hành động</th>
      </tr>
    </thead>
    <tbody>
      @for (course of courses; track course.courseID) {
      <tr>
        <td>{{ course.courseCode }}</td>
        <td>{{ course.courseName }}</td>
        <td>{{ course.credits }}</td>
        <td>
          <button class="btn btn-danger btn-sm"
                  (click)="deleteCourse(course.courseID)">
            Xóa
          </button>
        </td>
      </tr>
      } @empty {
      <tr>
        <td colspan="4" class="text-center">Không có học phần nào trong danh sách.</td>
      </tr>
      }
    </tbody>

  </table>

</div>
