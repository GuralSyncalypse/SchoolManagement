<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Danh sách Đăng ký Học phần</h2>
    <button class="btn btn-primary" (click)="onCreate()">+ Thêm mới đăng ký</button>
  </div>

  <table class="table table-hover table-bordered">
    <thead class="table-light">
      <tr>
        <th>Mã Sinh viên</th>
        <th>Mã Môn học</th>
        <th>Ngày đăng ký</th>
        <th class="text-center">Thao tác</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of enrollments()">
        <td>{{ item.studentID }}</td>
        <td>{{ item.courseID }}</td>
        <td>{{ item.enrollmentDate | date:'dd/MM/yyyy' }}</td>
        <td class="text-center">
          <button class="btn btn-sm btn-outline-warning me-2"
                  (click)="onUpdate(item.studentID, item.courseID)">
            Sửa
          </button>

          <button class="btn btn-sm btn-outline-danger"
                  (click)="onDelete(item.studentID, item.courseID)">
            Xóa
          </button>
        </td>
      </tr>

      <tr *ngIf="enrollments().length === 0">
        <td colspan="4" class="text-center text-muted">Chưa có lượt đăng ký nào.</td>
      </tr>
    </tbody>
  </table>
</div>
