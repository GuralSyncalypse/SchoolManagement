<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h3>{{ isEditMode() ? 'Cập nhật đăng ký' : 'Thêm mới đăng ký' }}</h3>
    </div>
    <div class="card-body">
      <form [formGroup]="enrollmentForm" (ngSubmit)="onSubmit()">

        <div class="mb-3">
          <label class="form-label">Mã Sinh viên</label>
          <input type="text" formControlName="studentID" class="form-control"
                 [class.is-invalid]="enrollmentForm.get('studentID')?.invalid && enrollmentForm.get('studentID')?.touched"
                 [readonly]="isEditMode()"> <div class="invalid-feedback">Mã sinh viên là bắt buộc.</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Mã Môn học</label>
          <input type="number" formControlName="courseID" class="form-control"
                 [class.is-invalid]="enrollmentForm.get('courseID')?.invalid && enrollmentForm.get('courseID')?.touched"
                 [readonly]="isEditMode()">
          <div class="invalid-feedback">Mã môn học là bắt buộc.</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Ngày đăng ký</label>
          <input type="date" formControlName="enrollmentDate" class="form-control"
                 [class.is-invalid]="enrollmentForm.get('enrollmentDate')?.invalid && enrollmentForm.get('enrollmentDate')?.touched">
        </div>

        <div class="d-flex justify-content-end gap-2">
          <button type="button" class="btn btn-secondary" routerLink="/enrollments">Hủy</button>
          <button type="submit" class="btn btn-success"
                  [disabled]="isSubmitting() || enrollmentForm.invalid">
            {{ isSubmitting() ? 'Đang lưu...' : 'Lưu đăng ký' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
