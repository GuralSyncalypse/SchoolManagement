<div class="container">
  <div class="header-section">
    <h2>Hệ Thống Quản Lý Môn Học</h2>
    <button class="btn btn-create" (click)="onCreate()">+ Thêm Môn Học Mới</button>
  </div>

  <table class="data-table">
    <thead>
      <tr>
        <th>Mã Định Danh (ID)</th>
        <th>Mã Môn Học</th>
        <th>Tên Môn Học</th>
        <th>Số Tín Chỉ</th>
        <th>Thao Tác Xử Lý</th>
      </tr>
    </thead>
    <tbody>
      @for (course of courses(); track course.courseID) {
      <tr>
        <td>#{{ course.courseID }}</td>
        <td>{{ course.courseCode }}</td>
        <td><strong>{{ course.courseName }}</strong></td>
        <td>{{ course.credits }}</td>
        <td>
          <button class="btn btn-update" (click)="onUpdate(course)">Sửa</button>
          <button class="btn btn-delete" (click)="onDelete(course.courseID)">Xóa</button>
        </td>
      </tr>
      } @empty {
      <tr>
        <td colspan="5" class="empty-message">Hiện chưa có dữ liệu môn học nào trong hệ thống.</td>
      </tr>
      }
    </tbody>
  </table>
</div>
