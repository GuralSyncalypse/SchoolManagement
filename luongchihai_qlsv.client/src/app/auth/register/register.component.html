<div class="register-wrapper">
    <div class="register-card">
        <div class="register-header">
            <div class="portal-icon">📝</div>
            <h2>ĐĂNG KÝ TÀI KHOẢN</h2>
            <p>Tạo tài khoản mới để truy cập hệ thống quản lý</p>
        </div>

        <div *ngIf="errorMessage" class="alert-danger">⚠️ {{ errorMessage }}</div>
        <div *ngIf="successMessage" class="alert-success">✅ {{ successMessage }}</div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

            <div class="form-group">
                <label>Vai trò hệ thống</label>
                <select formControlName="roleName" class="form-control">
                    <option value="Student">Sinh Viên (Student)</option>
                    <option value="Admin">Quản Trị Viên (Admin)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" formControlName="username" placeholder="Nhập tên tài khoản tối thiểu 4 ký tự..." />
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" formControlName="password" placeholder="Nhập mật khẩu bí mật..." />
            </div>

            <div *ngIf="registerForm.get('roleName')?.value === 'Student'" class="student-info-section">
                <hr />
                <p class="section-title">Thông Tin Hồ Sơ Sinh Viên</p>

                <div class="form-group">
                    <label>Mã số sinh viên (MSSV)</label>
                    <input type="text" formControlName="studentID" placeholder="Ví dụ: SV202601..." />
                </div>

                <div class="form-group">
                    <label>Họ và tên</label>
                    <input type="text" formControlName="studentName" placeholder="Nhập tên tiếng Việt có dấu..." />
                </div>

                <div class="form-group">
                    <label>Giới tính</label>
                    <select formControlName="gender" class="form-control">
                        <option value="Nam">Nam</option>
                        <option value="Nữ">Nữ</option>
                        <option value="Khác">Khác</option>
                    </select>
                </div>
            </div>

            <button type="submit" [disabled]="registerForm.invalid || isLoading" class="btn-submit">
                <span *ngIf="!isLoading">ĐĂNG KÝ TÀI KHOẢN</span>
                <span *ngIf="isLoading">Đang khởi tạo thực thể...</span>
            </button>

            <div class="register-footer">
                <a routerLink="/login">← Quay lại trang đăng nhập</a>
            </div>
        </form>
    </div>
</div>
