<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-info text-white">
      <h3>{{ isEditMode() ? 'Chỉnh sửa điểm số' : 'Nhập điểm mới' }}</h3>
    </div>
    <div class="card-body">
      <form [formGroup]="scoreForm" (ngSubmit)="onSubmit()">
        <input type="hidden" formControlName="scoreId">

        <div class="mb-3">
          <label class="form-label">Mã Sinh viên</label>
          <input type="text" formControlName="studentID" class="form-control"
                 [class.is-invalid]="scoreForm.get('studentID')?.invalid && scoreForm.get('studentID')?.touched">
          <div class="invalid-feedback">Vui lòng nhập mã sinh viên hợp lệ.</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Mã Môn học</label>
          <input type="number" formControlName="courseID" class="form-control"
                 [class.is-invalid]="scoreForm.get('courseID')?.invalid && scoreForm.get('courseID')?.touched">
          <div class="invalid-feedback">Vui lòng nhập mã môn học hợp lệ.</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Loại điểm (VD: Giữa kỳ, Cuối kỳ)</label>
          <input type="text" formControlName="scoreType" class="form-control"
                 [class.is-invalid]="scoreForm.get('scoreType')?.invalid && scoreForm.get('scoreType')?.touched">
          <div class="invalid-feedback">Loại điểm là bắt buộc.</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Giá trị điểm (0 - 10)</label>
          <input type="number" formControlName="scoreValue" class="form-control" step="0.1"
                 [class.is-invalid]="scoreForm.get('scoreValue')?.invalid && scoreForm.get('scoreValue')?.touched">
          <div class="invalid-feedback">Điểm phải nằm trong khoảng từ 0 đến 10.</div>
        </div>

        <div class="d-flex justify-content-end gap-2">
          <button type="button" class="btn btn-secondary" routerLink="/scores">Hủy</button>
          <button type="submit" class="btn btn-success" [disabled]="isSubmitting() || scoreForm.invalid">
            {{ isSubmitting() ? 'Đang lưu...' : 'Lưu điểm' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
