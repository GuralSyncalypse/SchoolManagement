<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Danh sách Điểm số</h2>
    <button class="btn btn-primary" (click)="onCreate()">+ Thêm mới điểm</button>
  </div>

  <table class="table table-hover table-bordered">
    <thead class="table-light">
      <tr>
        <th>ID</th>
        <th>Mã Sinh viên</th>
        <th>Mã Môn học</th>
        <th>Loại điểm</th>
        <th>Giá trị</th>
        <th class="text-center">Thao tác</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of scores()">
        <td>{{ item.scoreId }}</td>
        <td>{{ item.studentID }}</td>
        <td>{{ item.courseID }}</td>
        <td>
          <span class="badge bg-info text-dark">{{ item.scoreType }}</span>
        </td>
        <td>
          <strong>{{ item.scoreValue | number:'1.1-2' }}</strong>
        </td>
        <td class="text-center">
          <button class="btn btn-sm btn-outline-warning me-2" (click)="onUpdate(item.scoreId)">Sửa</button>

          <button class="btn btn-sm btn-outline-danger" (click)="onDelete(item.scoreId)">Xóa</button>
        </td>
      </tr>

      <tr *ngIf="scores().length === 0">
        <td colspan="6" class="text-center text-muted">Chưa có đầu điểm nào được nhập.</td>
      </tr>
    </tbody>
  </table>
</div>
