<div class="admin-container">
  
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-brand">
        <span class="brand-icon">🏫</span>
        <h1 class="brand-title">EduPortal Admin</h1>
      </div>
      <nav class="sidebar-menu">
        <a [routerLink]="['/admin/dashboard']" routerLinkActive="active" class="sidebar-link">
          <span class="menu-icon">📊</span> Tổng quan
        </a>
        <a [routerLink]="['/admin/students']" routerLinkActive="active" class="sidebar-link">
          <span class="menu-icon">🎓</span> Quản lý học viên
        </a>
        <a [routerLink]="['/admin/courses']" routerLinkActive="active" class="sidebar-link">
          <span class="menu-icon">📚</span> Quản lý khóa học
        </a>
        <a [routerLink]="['/admin/enrollments']" routerLinkActive="active" class="sidebar-link">
          <span class="menu-icon">📝</span> Đăng ký học phần
        </a>
      </nav>
    </div>
    
    <div class="sidebar-profile">
        <div class="avatar">A</div>
        <div class="profile-info">
            <p class="profile-name">Quản trị viên</p>
            <button (click)="onLogout()" class="logout-btn">Đăng xuất</button>
        </div>
    </div>
  </aside>

  <main class="main-content">
    
    <header class="topbar">
      <div class="topbar-left">
        <h2 class="page-title">Bảng điều khiển</h2>
      </div>
      <div class="topbar-right">
        <span class="topbar-date">Thứ Ba, 30 Tháng 6, 2026</span>
        <div class="notification-wrapper">
          <span class="notification-badge">3</span>
          <button class="notification-btn">🔔</button>
        </div>
      </div>
    </header>

    <router-outlet></router-outlet>
    
  </main>
</div>
